name: MNL Morning News

on:

  schedule:

    # Brisbane 06:00 = UTC 20:00

    - cron: "0 20 * * *"

  workflow_dispatch:

jobs:

  run-news:

    runs-on: ubuntu-latest

    steps:

      - name: Call Render MNL News Bot

        run: |

          echo "Starting MNL news bot..."

          

          curl -L --fail --show-error --silent \

            "${{ secrets.RENDER_BASE_URL }}/MNL-run-news"

          echo "MNL news bot completed."