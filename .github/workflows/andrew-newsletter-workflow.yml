name: Andrew Newsletter

on:
  schedule:
    - cron: '0 21 * * *'  # 매일 오전 7:00 Brisbane (UTC+10)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  newsletter:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 저장소 체크아웃 ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}

      # ── 2. Python 세팅 ──────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. 패키지 설치 ──────────────────────────────────
      - name: Install dependencies
        run: pip install -r andrew-newsletter-requirements.txt

      # ── 4. 뉴스 수집 + Gemini 요약 생성 ────────────────
      - name: Collect news and generate summaries
        env:
          NEWSLETTER_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}

        run: python andrew-newsletter-collect.py

      # ── 5. GitHub Pages 배포 준비 ───────────────────────
      - name: Prepare docs folder
        run: |
          mkdir -p docs
          cp andrew-newsletter-news.json docs/
          cp andrew-newsletter-web.html docs/index.html

      # ── 6. 변경사항 커밋 & 푸시 ─────────────────────────
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "📰 뉴스 업데이트 $(date +'%Y-%m-%d %H:%M') UTC"
          git push

      # ── 7. 텔레그램 뉴스레터 전송 ───────────────────────
      - name: Send Telegram newsletter
        env:
          NEWSLETTER_TOKEN: ${{ secrets.NEWSLETTER_TOKEN }}
          NEWSLETTER_CHAT_ID: ${{ secrets.NEWSLETTER_CHAT_ID }}
        run: python andrew-newsletter-telegram.py
