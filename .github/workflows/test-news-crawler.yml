name: Test Naver News Crawler

on:
  push:
    paths:
      - 'news-crawler-naver-ai-tesla-apple.py'
  workflow_dispatch:

jobs:
  test-crawler:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Naver News Crawler
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          pip install requests
          python news-crawler-naver-ai-tesla-apple.py

      - name: Upload collected news
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collected-news
          path: "*.json"
          retention-days: 7