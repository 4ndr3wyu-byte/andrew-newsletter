<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Andrew Newsletter</title>
<style>
  :root {
    --bg:       #0c0c0e;
    --card:     #141416;
    --border:   #222226;
    --accent:   #ff4757;
    --accent2:  #ffa502;
    --text:     #e8e8f0;
    --muted:    #888899;
    --tag-bg:   #1e1e22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

/* ── 헤더 ── */
header {
position: sticky; top: 0; z-index: 100;
background: rgba(12,12,14,0.95);
backdrop-filter: blur(12px);
border-bottom: 1px solid var(–border);
padding: 14px 16px 0;
}
.header-top {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 12px;
}
.logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
.logo span { color: var(–accent); }
.date-badge {
font-size: 11px; color: var(–muted);
background: var(–tag-bg);
padding: 4px 8px; border-radius: 6px;
}
.settings-btn {
background: none; border: none; cursor: pointer;
color: var(–muted); font-size: 18px; padding: 4px;
}

/* ── 소스 탭 ── */
.source-tabs {
display: flex; gap: 6px;
overflow-x: auto; padding-bottom: 12px;
scrollbar-width: none;
}
.source-tabs::-webkit-scrollbar { display: none; }
.tab {
flex-shrink: 0;
padding: 6px 12px; border-radius: 20px;
font-size: 12px; font-weight: 600;
border: 1px solid var(–border);
background: var(–tag-bg); color: var(–muted);
cursor: pointer; transition: all 0.2s;
white-space: nowrap;
}
.tab.active {
background: var(–accent); border-color: var(–accent);
color: #fff;
}

/* ── 카드 목록 ── */
main { padding: 16px; }
.section-header {
display: flex; align-items: center; gap: 8px;
margin: 20px 0 10px;
font-size: 13px; font-weight: 700; color: var(–muted);
text-transform: uppercase; letter-spacing: 0.5px;
}
.section-header::after {
content: ‘’; flex: 1; height: 1px; background: var(–border);
}
.card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 12px;
padding: 14px;
margin-bottom: 10px;
cursor: pointer;
transition: border-color 0.2s, transform 0.1s;
position: relative;
}
.card:active { transform: scale(0.99); }
.card:hover { border-color: #333340; }
.card-source {
font-size: 10px; font-weight: 700;
color: var(–accent); text-transform: uppercase;
letter-spacing: 0.8px; margin-bottom: 6px;
}
.card-title {
font-size: 14px; font-weight: 600;
line-height: 1.4; margin-bottom: 10px;
color: var(–text);
}
.card-summary {
font-size: 12px; color: var(–muted);
line-height: 1.6;
}
.card-summary p { margin-bottom: 2px; }
.card-summary p::before { content: “• “; color: var(–accent); }
.card-arrow {
position: absolute; right: 14px; top: 50%;
transform: translateY(-50%);
color: var(–border); font-size: 16px;
}

/* ── 딥 분석 모달 ── */
.modal-overlay {
display: none; position: fixed; inset: 0; z-index: 200;
background: rgba(0,0,0,0.85);
backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; align-items: flex-end; }
.modal {
background: #141416;
border-radius: 20px 20px 0 0;
border-top: 1px solid var(–border);
width: 100%; max-height: 90vh;
display: flex; flex-direction: column;
animation: slideUp 0.3s ease;
}
@keyframes slideUp {
from { transform: translateY(100%); }
to   { transform: translateY(0); }
}
.modal-handle {
width: 36px; height: 4px;
background: var(–border); border-radius: 2px;
margin: 12px auto 0;
}
.modal-header {
padding: 12px 16px 14px;
border-bottom: 1px solid var(–border);
display: flex; align-items: flex-start; gap: 10px;
}
.modal-source-badge {
font-size: 10px; font-weight: 700; color: var(–accent);
background: rgba(255,71,87,0.12);
padding: 3px 8px; border-radius: 4px;
white-space: nowrap; flex-shrink: 0;
margin-top: 2px;
}
.modal-title {
font-size: 15px; font-weight: 700; line-height: 1.4;
flex: 1;
}
.modal-close {
background: var(–tag-bg); border: none; cursor: pointer;
color: var(–muted); width: 28px; height: 28px;
border-radius: 50%; font-size: 14px; flex-shrink: 0;
display: flex; align-items: center; justify-content: center;
}
.modal-body {
flex: 1; overflow-y: auto; padding: 16px;
}
.modal-actions {
padding: 10px 16px 24px;
border-top: 1px solid var(–border);
display: flex; gap: 8px;
}
.btn-primary {
flex: 1; padding: 12px;
background: var(–accent); color: #fff;
border: none; border-radius: 10px;
font-size: 14px; font-weight: 600; cursor: pointer;
}
.btn-secondary {
padding: 12px 16px;
background: var(–tag-bg); color: var(–text);
border: 1px solid var(–border); border-radius: 10px;
font-size: 14px; font-weight: 600; cursor: pointer;
text-decoration: none; display: flex; align-items: center;
}

/* ── 딥 분석 콘텐츠 ── */
.analysis-loading {
text-align: center; padding: 40px 20px; color: var(–muted);
}
.spinner {
width: 32px; height: 32px; margin: 0 auto 12px;
border: 3px solid var(–border);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.analysis-content { font-size: 14px; line-height: 1.8; color: var(–text); }
.analysis-content h3 {
font-size: 15px; font-weight: 700; color: var(–accent2);
margin: 20px 0 8px;
}
.analysis-content p { margin-bottom: 14px; color: #c8c8d8; }
.analysis-error {
padding: 20px; text-align: center; color: var(–muted);
}

/* ── 설정 모달 ── */
.settings-overlay {
display: none; position: fixed; inset: 0; z-index: 300;
background: rgba(0,0,0,0.9);
align-items: center; justify-content: center;
padding: 20px;
}
.settings-overlay.open { display: flex; }
.settings-box {
background: var(–card); border: 1px solid var(–border);
border-radius: 16px; padding: 24px; width: 100%; max-width: 360px;
}
.settings-box h2 { font-size: 16px; margin-bottom: 6px; }
.settings-box p { font-size: 12px; color: var(–muted); margin-bottom: 16px; }
.settings-box input {
width: 100%; background: var(–bg);
border: 1px solid var(–border); border-radius: 8px;
padding: 10px 12px; color: var(–text); font-size: 13px;
margin-bottom: 12px;
}
.settings-box input:focus { outline: none; border-color: var(–accent); }
.settings-row { display: flex; gap: 8px; }
.btn-cancel {
flex: 1; padding: 10px;
background: var(–tag-bg); color: var(–muted);
border: 1px solid var(–border); border-radius: 8px;
font-size: 14px; cursor: pointer;
}
.btn-save {
flex: 1; padding: 10px;
background: var(–accent); color: #fff;
border: none; border-radius: 8px;
font-size: 14px; font-weight: 600; cursor: pointer;
}

/* ── 로딩 / 빈 상태 ── */
.loading-screen {
display: flex; flex-direction: column;
align-items: center; justify-content: center;
min-height: 60vh; gap: 12px; color: var(–muted);
}
.no-key-notice {
background: rgba(255,71,87,0.08);
border: 1px solid rgba(255,71,87,0.2);
border-radius: 10px; padding: 12px 14px;
font-size: 12px; color: var(–muted);
margin-bottom: 16px; text-align: center;
}
.no-key-notice b { color: var(–accent); }
</style>

</head>
<body>

<!-- ── 헤더 ── -->

<header>
  <div class="header-top">
    <div class="logo">Andrew<span>.</span>news</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="date-badge" id="dateBadge">로딩 중...</span>
      <button class="settings-btn" onclick="openSettings()" title="설정">⚙️</button>
    </div>
  </div>
  <div class="source-tabs" id="sourceTabs"></div>
</header>

<!-- ── 카드 목록 ── -->

<main id="cardList">
  <div class="loading-screen">
    <div class="spinner"></div>
    <span>뉴스 로딩 중...</span>
  </div>
</main>

<!-- ── 딥 분석 모달 ── -->

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-source-badge" id="modalSource"></span>
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn-primary" id="analyzeBtn" onclick="runAnalysis()">
        🤖 딥 분석 (한국어)
      </button>
      <a class="btn-secondary" id="originalLink" href="#" target="_blank">🔗 원문</a>
    </div>
  </div>
</div>

<!-- ── 설정 모달 ── -->

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-box">
    <h2>⚙️ 설정</h2>
    <p>딥 분석 기능을 사용하려면 Gemini API 키가 필요합니다. 브라우저에만 저장되며 외부로 전송되지 않습니다.</p>
    <input type="password" id="apiKeyInput" placeholder="Gemini API Key 입력..." />
    <div class="settings-row">
      <button class="btn-cancel" onclick="closeSettings()">취소</button>
      <button class="btn-save" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<script>
const SOURCES_ORDER = [
  "Reuters","Bloomberg","Financial Times",
  "The Verge","TechCrunch","Ars Technica",
  "Electrek","Teslarati","MacRumors","9to5Mac"
];
const SOURCE_ICONS = {
  "Reuters":"🔴","Bloomberg":"🟣","Financial Times":"🟡",
  "The Verge":"🔵","TechCrunch":"🟢","Ars Technica":"🟠",
  "Electrek":"⚡","Teslarati":"🚗","MacRumors":"🍎","9to5Mac":"📱"
};

let allArticles = [];
let currentArticle = null;
let currentFilter = "전체";
let analysisCache = {};

// ── 데이터 로드 ────────────────────────────────────────
async function loadNews() {
  try {
    const resp = await fetch("andrew-newsletter-news.json?t=" + Date.now());
    const data = await resp.json();
    allArticles = data.articles;
    document.getElementById("dateBadge").textContent = data.date;
    renderTabs();
    renderCards("전체");
  } catch(e) {
    document.getElementById("cardList").innerHTML =
      `<div class="loading-screen" style="color:#888">
        <div>📭</div>
        <span>뉴스 데이터를 불러올 수 없습니다</span>
        <span style="font-size:11px">GitHub Actions가 실행된 후 다시 시도해주세요</span>
      </div>`;
  }
}

// ── 탭 렌더 ────────────────────────────────────────────
function renderTabs() {
  const tabs = document.getElementById("sourceTabs");
  const all  = ["전체", ...SOURCES_ORDER];
  tabs.innerHTML = all.map(s =>
    `<button class="tab ${s === currentFilter ? 'active' : ''}"
      onclick="filterBy('${s}')">${SOURCE_ICONS[s] || "📰"} ${s}</button>`
  ).join("");
}

// ── 필터 ──────────────────────────────────────────────
function filterBy(source) {
  currentFilter = source;
  renderTabs();
  renderCards(source);
}

// ── 카드 렌더 ──────────────────────────────────────────
function renderCards(filter) {
  const list = document.getElementById("cardList");
  const filtered = filter === "전체"
    ? allArticles
    : allArticles.filter(a => a.source === filter);

  if (!filtered.length) {
    list.innerHTML = `<div class="loading-screen"><span>기사가 없습니다</span></div>`;
    return;
  }

  // 소스별 섹션
  const grouped = {};
  filtered.forEach(a => {
    if (!grouped[a.source]) grouped[a.source] = [];
    grouped[a.source].push(a);
  });

  const sources = filter === "전체" ? SOURCES_ORDER : [filter];
  let html = "";

  if (filter === "전체") {
    html += `<div style="padding:4px 0 12px;font-size:12px;color:var(--muted)">
      총 <b style="color:var(--text)">${filtered.length}개</b> 기사 · 10개 소스
    </div>`;
  }

  // API 키 없을 때 안내
  if (!localStorage.getItem("gemini_api_key")) {
    html += `<div class="no-key-notice">
      <b>⚙️ 딥 분석 기능</b>을 사용하려면 우측 상단 설정에서 Gemini API 키를 입력해주세요
    </div>`;
  }

  sources.forEach(src => {
    const items = grouped[src];
    if (!items || !items.length) return;
    const icon = SOURCE_ICONS[src] || "📰";
    html += `<div class="section-header">${icon} ${src}</div>`;
    items.forEach(a => {
      const lines = a.summary_ko.split("\n").filter(l => l.trim());
      const summaryHtml = lines.map(l => `<p>${l}</p>`).join("");
      html += `
        <div class="card" onclick="openArticle('${a.id}')">
          <div class="card-source">${src}</div>
          <div class="card-title">${a.title}</div>
          <div class="card-summary">${summaryHtml}</div>
          <span class="card-arrow">›</span>
        </div>`;
    });
  });

  list.innerHTML = html;
}

// ── 기사 모달 열기 ─────────────────────────────────────
function openArticle(id) {
  currentArticle = allArticles.find(a => a.id === id);
  if (!currentArticle) return;

  document.getElementById("modalSource").textContent =
    (SOURCE_ICONS[currentArticle.source] || "") + " " + currentArticle.source;
  document.getElementById("modalTitle").textContent  = currentArticle.title;
  document.getElementById("originalLink").href       = currentArticle.link;

  // 캐시된 분석 있으면 바로 표시
  const body = document.getElementById("modalBody");
  if (analysisCache[id]) {
    showAnalysisResult(analysisCache[id]);
    document.getElementById("analyzeBtn").style.display = "none";
  } else {
    const lines = currentArticle.summary_ko.split("\n").filter(l => l.trim());
    const summaryHtml = lines.map(l =>
      `<p style="border-left:2px solid var(--border);padding-left:10px;color:var(--muted)">${l}</p>`
    ).join("");
    body.innerHTML = `
      <div style="margin-bottom:16px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">3줄 요약</div>
        ${summaryHtml}
      </div>
      <div style="font-size:12px;color:var(--muted);text-align:center;padding:10px 0">
        아래 버튼을 눌러 전체 내용을 한국어로 분석해보세요
      </div>`;
    document.getElementById("analyzeBtn").style.display = "flex";
  }

  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

// ── 딥 분석 실행 ───────────────────────────────────────
async function runAnalysis() {
  const apiKey = localStorage.getItem("gemini_api_key");
  if (!apiKey) {
    openSettings();
    return;
  }

  const btn  = document.getElementById("analyzeBtn");
  const body = document.getElementById("modalBody");

  btn.disabled    = true;
  btn.textContent = "분석 중...";
  body.innerHTML  = `<div class="analysis-loading"><div class="spinner"></div>AI가 기사를 분석하고 있습니다...</div>`;

  const a = currentArticle;
  const prompt = `
다음 영문 기사를 한국어로 아주 자세히 풀어서 작성해줘.

반드시 지켜야 할 규칙:

1. 이 작업은 짧은 요약이 아니다.
   - 전체 내용을 최대한 자세히 풀어서 작성한다.
   - 글의 흐름, 설명, 예시, 비교, 주장, 결론을 최대한 빠짐없이 담는다.
   - 단순 요약처럼 짧게 압축하지 않는다.

2. 전체 내용을 자연스러운 한국어로 번역해서 작성한다.
   - 영어 표현을 그대로 두지 말고 한국어 독자가 이해하기 쉽게 바꾼다.

3. 내용을 지어내지 않는다.
   - 확인되지 않는 내용은 추가하지 않는다.
   - 기사를 분석할 수 없으면 '기사를 분석할 수 없습니다'라고 답한다.

4. 문단을 반드시 나눈다.
   - 4~6문장마다 빈 줄을 넣는다.
   - 읽기 쉽게 소제목을 넣는다.
   - 소제목은 ### 형식으로 작성한다.

5. 마지막에는 반드시 아래 항목을 포함한다.
   - ### 최종 정리

기사 출처: ${a.source}
기사 제목: ${a.title}
기사 URL: ${a.link}
기사 요약: ${a.description}
`;

  try {
    const url  = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
    const resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        tools: [{ google_search: {} }],
        generationConfig: { temperature: 0.3, maxOutputTokens: 4096 }
      })
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";

    if (!text) throw new Error("응답이 비어있습니다");

    analysisCache[a.id] = text;
    showAnalysisResult(text);
    btn.style.display = "none";

  } catch(e) {
    body.innerHTML = `<div class="analysis-error">
      ❌ 분석 실패: ${e.message}<br>
      <small style="color:var(--muted)">API 키를 확인하거나 잠시 후 다시 시도해주세요</small>
    </div>`;
    btn.disabled    = false;
    btn.textContent = "🤖 딥 분석 (한국어)";
  }
}

// ── 분석 결과 표시 ─────────────────────────────────────
function showAnalysisResult(text) {
  // ### 소제목 → <h3>, 줄바꿈 → <p>
  const html = text
    .split("\n")
    .map(line => {
      if (line.startsWith("### ")) return `<h3>${line.replace("### ", "")}</h3>`;
      if (line.startsWith("## "))  return `<h3>${line.replace("## ", "")}</h3>`;
      if (line.trim() === "")      return `<br>`;
      return `<p>${line}</p>`;
    })
    .join("");

  document.getElementById("modalBody").innerHTML =
    `<div class="analysis-content">${html}</div>`;
}

// ── 설정 ──────────────────────────────────────────────
function openSettings() {
  const key = localStorage.getItem("gemini_api_key") || "";
  document.getElementById("apiKeyInput").value = key;
  document.getElementById("settingsOverlay").classList.add("open");
}
function closeSettings() {
  document.getElementById("settingsOverlay").classList.remove("open");
}
function saveSettings() {
  const key = document.getElementById("apiKeyInput").value.trim();
  if (key) localStorage.setItem("gemini_api_key", key);
  else     localStorage.removeItem("gemini_api_key");
  closeSettings();
  renderCards(currentFilter); // 안내 메시지 갱신
}

// ── 시작 ──────────────────────────────────────────────
loadNews();
</script>

</body>
</html>
